<!DOCTYPE html>
<html lang="sv">
<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Games | GameZone</title>

  <link rel="stylesheet" href="CSS/style.css">

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

</head>
<body>

<header>

  <nav class="navbar">

    <div class="menu-btn">

      <i class="fas fa-bars"></i>

    </div>

    <h1 class="logo">

      GAME<span>ZONE</span>

    </h1>

    <ul class="nav-links">

      <li><a href="index.html">HOME</a></li>

      <li><a href="games.html">GAMES</a></li>

      <li><a href="#">SETUPS</a></li>

      <li><a href="#">COMMUNITY</a></li>

    </ul>

  </nav>

</header>

<section class="games-page">

  <div class="games-top">

    <h2>POPULAR GAMES</h2>

    <input
      type="text"
      placeholder="Search games..."
      id="searchInput"
    >

  </div>

  <div class="games-grid" id="gamesContainer"></div>

  </div>

</section>

<script>

const gamesContainer = document.getElementById('gamesContainer');

const searchInput = document.getElementById('searchInput');

const API_KEY = '4df25c2226dd4e2e8f79e305677ef996';

let allGames = [];

async function fetchGames(){

  try{

    const response = await fetch(
      `https://api.rawg.io/api/games?key=${API_KEY}`
    );

    const data = await response.json();

    allGames = data.results;

    displayGames(allGames);

  }
  catch(error){

    console.log(error);

  }

}

function displayGames(games){

  gamesContainer.innerHTML = '';

  games.forEach(game => {

    const card = document.createElement('div');

    card.classList.add('game-card');

    card.innerHTML = `
    
      <img src="${game.background_image}" alt="${game.name}">

      <div class="game-info">

        <div class="top-card">

          <h3>${game.name}</h3>

          <span class="rating">
            ⭐ ${game.rating}
          </span>

        </div>

        <div class="tags">

          ${
            game.genres
            .slice(0,2)
            .map(genre => `<span>${genre.name}</span>`)
            .join('')
          }

        </div>

        <div class="card-buttons">

          <button class="view-btn">
            View
          </button>

          <button class="fav-btn">
            ❤️
          </button>

        </div>

      </div>

    `;

    gamesContainer.appendChild(card);

  });

}

searchInput.addEventListener('input', () => {

  const value = searchInput.value.toLowerCase();

  const filteredGames = allGames.filter(game => {

    return game.name.toLowerCase().includes(value);

  });

  displayGames(filteredGames);

});

fetchGames();

</script>
<script src="JS/api.js"></script>
</body>
</html>
